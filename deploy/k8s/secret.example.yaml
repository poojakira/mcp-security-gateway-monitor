apiVersion: docs.example/v1
kind: SecretTemplate
metadata:
  name: mcp-monitor-secrets
  namespace: mcp-monitor
description: >
  Documentation-only example. Do not apply this file to a cluster. Create the
  real Secret with kubectl create secret generic mcp-monitor-secrets
  --from-literal=MCP_API_KEY=...
requiredKeys:
  - MCP_API_KEY
