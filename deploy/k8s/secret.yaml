# Secrets for mcp-monitor. DO NOT commit real values — this is a template.
# Populate via your secret manager (Sealed Secrets, External Secrets Operator,
# Vault Agent, SOPS), not plaintext in git.
apiVersion: v1
kind: Secret
metadata:
  name: mcp-monitor-secrets
  namespace: mcp-monitor
  labels:
    app.kubernetes.io/name: mcp-monitor
type: Opaque
stringData:
  # Alerting webhook (sensitive URL with embedded token).
  MCP_WEBHOOK_URL: ""
  # Bearer token required by the API when set (see production/server.py).
  MCP_API_TOKEN: ""
