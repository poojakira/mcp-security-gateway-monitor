apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-monitor-config
  namespace: mcp-monitor
  labels:
    app.kubernetes.io/name: mcp-monitor
data:
  MCP_LISTEN_PORT: "8080"
  MCP_SHADOW_MODE: "false"
  MCP_WEBHOOK_URL: ""
  MCP_RATE_LIMIT_RPM: "600"
  MCP_CIRCUIT_BREAKER_THRESHOLD: "5"
  MCP_CIRCUIT_BREAKER_TIMEOUT: "30"
  MCP_LOG_LEVEL: "INFO"
  MCP_ALLOWED_SERVERS: ""
  MCP_MAX_PAYLOAD_KB: "512"
  # WAL and audit files are written to the mcp-monitor-data PVC in the sample deployment.
  # For horizontal scaling, use an external audit/WAL backend or per-pod PVC StatefulSet.
  MCP_WAL_PATH: "/data/mcp_monitor_wal.jsonl"
  MCP_AUDIT_PATH: "/data/mcp_monitor_audit.jsonl"
