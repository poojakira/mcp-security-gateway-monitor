apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-monitor
  namespace: mcp-monitor
  labels:
    app.kubernetes.io/name: mcp-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-monitor
    spec:
      containers:
        - name: mcp-monitor
          # Pin to an immutable tag/digest, e.g. ghcr.io/org/mcp-monitor:v1.0.0
          image: mcp-monitor:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mcp-monitor-config
          env:
            # Secrets come from a Secret, never the ConfigMap (L3).
            - name: MCP_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: mcp-monitor-secrets
                  key: MCP_WEBHOOK_URL
                  optional: true
            - name: MCP_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-monitor-secrets
                  key: MCP_API_TOKEN
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: wal-data
              mountPath: /data
      volumes:
        # WAL is per-pod scratch used only for crash replay within a pod's
        # lifetime. The durable audit trail is shipped to a cluster log
        # aggregator via stdout (MCP_AUDIT_STDOUT=1 in the ConfigMap), because
        # an emptyDir is destroyed on pod restart/reschedule and MUST NOT be
        # treated as the system of record.
        #
        # If you require the on-disk audit file to survive restarts, replace the
        # emptyDir below with a PersistentVolumeClaim (use a StatefulSet for
        # per-replica RWO volumes):
        #   - name: wal-data
        #     persistentVolumeClaim:
        #       claimName: mcp-monitor-wal
        - name: wal-data
          emptyDir: {}
      terminationGracePeriodSeconds: 30
