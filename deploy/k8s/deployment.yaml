apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-monitor
  namespace: mcp-monitor
  labels:
    app.kubernetes.io/name: mcp-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-monitor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-monitor
          # Build and push this tag to your registry before applying.
          image: mcp-monitor:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mcp-monitor-config
          env:
            - name: MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mcp-monitor-secrets
                  key: MCP_API_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: wal-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: wal-data
          persistentVolumeClaim:
            claimName: mcp-monitor-data
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30