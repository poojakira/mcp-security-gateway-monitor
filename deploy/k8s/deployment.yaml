apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-monitor
  namespace: mcp-monitor
  labels:
    app.kubernetes.io/name: mcp-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-monitor
    spec:
      containers:
        - name: mcp-monitor
          # Set the image tag to a specific version for production deployments.
          # Replace YOUR_REGISTRY with your container registry (e.g., ghcr.io/org).
          image: mcp-monitor:${IMAGE_TAG:-latest}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mcp-monitor-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mcp-monitor-data
      terminationGracePeriodSeconds: 30
