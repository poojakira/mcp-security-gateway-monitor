services:
  mcp-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - MCP_LISTEN_PORT=8080
      - MCP_SHADOW_MODE=false
      - MCP_WEBHOOK_URL=
      - MCP_RATE_LIMIT_RPM=600
      - MCP_CIRCUIT_BREAKER_THRESHOLD=5
      - MCP_CIRCUIT_BREAKER_TIMEOUT=30
      - MCP_LOG_LEVEL=INFO
      - MCP_API_KEY=${MCP_API_KEY:?set MCP_API_KEY}
      - MCP_ALLOWED_SERVERS=
      - MCP_MAX_PAYLOAD_KB=512
      - MCP_WAL_PATH=/tmp/mcp_monitor_wal.jsonl
      - MCP_AUDIT_PATH=/tmp/mcp_monitor_audit.jsonl
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
